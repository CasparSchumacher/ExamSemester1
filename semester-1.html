<style>

<script>
(function(){
var S=window.S1, Q=S.questions, LZ=S.lernziele, NAME="Kreuzzug", W3F="bc25006f-8fbf-47ec-9df9-4aa6a82634be";
var MODNAME=S.meta.modnames, MODCOL={M02:"#2563eb",M03:"#16a34a",M04:"#9333ea"};
var MODS=["M02","M03","M04"];
var app=document.getElementById('app'), markEl=document.getElementById('markcount');
var qById={}; Q.forEach(function(q){qById[q.id]=q});
var MK="s1_marks_v1";
function getMarks(){try{return new Set(JSON.parse(localStorage.getItem(MK)||"[]"))}catch(e){return new Set()}}
function saveMarks(s){localStorage.setItem(MK,JSON.stringify(Array.from(s)))}
var marks=getMarks();
function updMarkCount(){markEl.textContent=marks.size?("("+marks.size+")"):"";}
function esc(s){var d=document.createElement('div');d.textContent=(s==null?'':s);return d.innerHTML;}
function shuffle(a){a=a.slice();for(var i=a.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var t=a[i];a[i]=a[j];a[j]=t;}return a;}

function figHtml(q){ if(!q.b) return ''; if(q.bok) return '<div class="abb"><img loading="lazy" src="img/'+esc(q.b)+'.jpg" alt="Abbildung '+esc(q.b)+'"><div class="abbcap">Abbildung '+esc(q.b)+' – zum Vergrößern klicken</div></div>'; return '<div class="abbmiss">⚠ Abbildung '+esc(q.b)+' – Bildbeilage im Original nicht verfügbar</div>'; }
function optsHtml(q){ if(q.o&&q.o.length){ return q.o.map(function(o){var c=o[2]; return '<li class="opt'+(c?' correct':'')+'"'+(c?' data-correct="1"':'')+'><span class="chk">'+(c?'✓':'')+'</span><span class="ol">'+esc(o[0])+')</span> '+esc(o[1])+'</li>';}).join(''); } return '<li class="opt correct" data-correct="1"><span class="chk">✓</span> '+esc(q.a)+'</li>'; }
function cardHtml(q){
  var col=MODCOL[q.mod]||'#666', mk=marks.has(q.id);
  var badges=''; if(q.nk>=2) badges+='<span class="badge freq">×'+q.nk+' Klausuren</span>'; (q.w||[]).forEach(function(w){badges+='<span class="badge wert">'+esc(w)+'</span>';});
  var sstr=esc((q.q+' '+(q.a||'')+' '+q.th+' '+q.mod+' '+q.mw+' '+q.lz).toLowerCase());
  return '<div class="card" data-id="'+esc(q.id)+'" data-mod="'+q.mod+'" data-mw="'+q.mw+'" data-lz="'+esc(q.lz)+'" data-s="'+sstr+'">'
   +'<div class="thema">'+esc(q.th)+' '+badges+'</div><div class="frage">'+esc(q.q)+'</div>'+figHtml(q)
   +'<ul class="opts">'+optsHtml(q)+'</ul>'
   +'<div class="answer"><span class="albl">Antwort:</span> '+(q.a?esc(q.a):'<i>im Protokoll nicht markiert</i>')+' <span class="src">'+esc(q.src)+'</span></div>'
   +'<div class="cardmeta"><span class="mchip" style="background:'+col+'">'+esc(q.mod)+' · '+esc(q.mw)+'</span>'
   +'<span class="lzref">Lernziel <b>'+esc(q.lz)+'</b> · '+esc(q.ver)+'</span>'
   +'<span class="cardacts"><span class="act mark'+(mk?' on':'')+'" data-act="mark">'+(mk?'★ markiert':'☆ markieren')+'</span>'
   +'<span class="act" data-act="report">⚑ Fehler melden</span></span></div></div>';
}
function groupedHtml(qs){
  var out='', cmod=null, cmw=null, clz=null;
  qs.forEach(function(q){
    if(q.mod!==cmod){ if(cmod!==null) out+='</div></div></div>'; else {} ; cmod=q.mod; cmw=null; clz=null;
      out+='<div class="mod-section" data-mod="'+q.mod+'"><div class="mod-head" style="background:'+MODCOL[q.mod]+'">'+esc(q.mod+" · "+(MODNAME[q.mod]||""))+'</div>'; out+='<!--mwopen-->'; }
  });
  // simpler: rebuild below
  return out;
}
// robustere Gruppierung
function renderGrouped(qs){
  var byMod={}; qs.forEach(function(q){(byMod[q.mod]=byMod[q.mod]||{}); (byMod[q.mod][q.mw]=byMod[q.mod][q.mw]||{}); (byMod[q.mod][q.mw][q.lz]=byMod[q.mod][q.mw][q.lz]||[]).push(q);});
  var out='';
  MODS.forEach(function(m){ if(!byMod[m])return; var col=MODCOL[m];
    out+='<div class="mod-section" data-mod="'+m+'"><div class="mod-head" style="background:'+col+'">'+esc(m+" · "+(MODNAME[m]||""))+'</div>';
    Object.keys(byMod[m]).sort().forEach(function(mw){
      out+='<div class="mw-group" data-mod="'+m+'" data-mw="'+mw+'"><div class="mw-head" style="background:'+col+'">'+m+' · '+mw+'</div>';
      Object.keys(byMod[m][mw]).sort().forEach(function(lid){
        var lz=qById[byMod[m][mw][lid][0].id]; var lzo=LZ.filter(function(x){return x.id===lid})[0]||{ver:lz.ver,t:''};
        out+='<div class="lz" data-mod="'+m+'" data-mw="'+mw+'" style="border-left-color:'+col+'">';
        out+='<span class="lz-id" style="background:'+col+'">'+esc(lid)+'</span> <span class="lz-count">'+byMod[m][mw][lid].length+' Frage(n)</span>';
        out+='<div class="lz-ver">'+esc(lzo.ver)+'</div><div class="lz-text">'+esc(lzo.t)+'</div>';
        byMod[m][mw][lid].forEach(function(q){out+=cardHtml(q);});
        out+='</div>';
      });
      out+='</div>';
    });
    out+='</div>';
  });
  return out;
}

// ---------- Views ----------
var ST={view:'ueben'};
function setTab(v){document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.dataset.view===v);});}
function showView(v){ST.view=v; setTab(v); window.scrollTo(0,0);
  if(v==='ueben')renderUeben(); else if(v==='quiz')renderQuiz(); else if(v==='lernziele')renderLernziele(); else if(v==='markiert')renderMarkiert(); else if(v==='hilfe')renderHilfe(); }

function renderUeben(){
  var h='<div class="toolbar"><div class="toolrow"><input class="search" id="us" placeholder="Suchen (Frage, Antwort, Stichwort, Lernziel …)"><span class="modechip">Klausurmodus</span></div>'
   +'<div class="toolrow"><span class="lbl">Modul:</span><button class="btn modbtn active" data-mod="all">Alle</button><button class="btn modbtn" data-mod="M02">M02</button><button class="btn modbtn" data-mod="M03">M03</button><button class="btn modbtn" data-mod="M04">M04</button>'
   +'<span class="sep"></span><span class="lbl">Modulwoche:</span><button class="btn mwbtn active" data-mw="all">Alle</button><button class="btn mwbtn" data-mw="MW1">MW1</button><button class="btn mwbtn" data-mw="MW2">MW2</button><button class="btn mwbtn" data-mw="MW3">MW3</button><button class="btn mwbtn" data-mw="MW4">MW4</button></div></div>';
  h+='<div id="ulist">'+renderGrouped(Q)+'</div>';
  app.innerHTML=h;
  var us=document.getElementById('us'); us.addEventListener('input',applyUeben);
  app.querySelectorAll('.modbtn').forEach(function(b){b.addEventListener('click',function(){app.querySelectorAll('.modbtn').forEach(function(x){x.classList.remove('active')});b.classList.add('active');applyUeben();});});
  app.querySelectorAll('.mwbtn').forEach(function(b){b.addEventListener('click',function(){app.querySelectorAll('.mwbtn').forEach(function(x){x.classList.remove('active')});b.classList.add('active');applyUeben();});});
}
function applyUeben(){
  var t=document.getElementById('us').value.trim().toLowerCase();
  var mod=app.querySelector('.modbtn.active').dataset.mod, mw=app.querySelector('.mwbtn.active').dataset.mw;
  app.querySelectorAll('.lz').forEach(function(lz){var okm=(mod==='all'||lz.dataset.mod===mod)&&(mw==='all'||lz.dataset.mw===mw),any=false;
    lz.querySelectorAll('.card').forEach(function(c){var ok=okm&&(!t||c.dataset.s.indexOf(t)>=0);c.style.display=ok?'':'none';if(ok)any=true;});
    lz.style.display=(okm&&any)?'':'none';});
  app.querySelectorAll('.mw-group').forEach(function(g){g.style.display=[].slice.call(g.querySelectorAll('.lz')).some(function(l){return l.style.display!=='none'})?'':'none';});
  app.querySelectorAll('.mod-section').forEach(function(s){s.style.display=[].slice.call(s.querySelectorAll('.mw-group')).some(function(g){return g.style.display!=='none'})?'':'none';});
}

function renderLernziele(){
  var h='<div class="toolbar"><div class="toolrow"><input class="search" id="ls" placeholder="Lernziel suchen (Text, ID, Stichwort) …"></div><div class="sub" style="margin:4px 0 0">Klick auf ein Lernziel zeigt die zugehörigen Klausurfragen. ('+LZ.filter(function(l){return l.n>0}).length+' mit Altfragen, '+LZ.filter(function(l){return l.n===0}).length+' ohne)</div></div>';
  var cmod=null,cmw=null;
  LZ.forEach(function(l){ var col=MODCOL[l.mod]||'#666';
    if(l.mod!==cmod){cmod=l.mod;cmw=null;h+='<div class="mod-head" style="background:'+col+';margin-top:18px">'+esc(l.mod+" · "+(MODNAME[l.mod]||""))+'</div>';}
    if(l.mw!==cmw){cmw=l.mw;h+='<div class="mw-head" style="background:'+col+'">'+l.mod+' · '+l.mw+'</div>';}
    var ss=esc((l.id+' '+l.t+' '+l.ver+' '+l.mod+' '+l.mw).toLowerCase());
    h+='<div class="lzrow'+(l.n?'':' empty')+'" data-lz="'+esc(l.id)+'" data-s="'+ss+'" style="border-left-color:'+col+'">'
      +'<span class="id">'+esc(l.id)+'</span><span class="tx">'+esc(l.t)+'<br><span style="color:var(--mut);font-size:12px">'+esc(l.ver)+'</span></span>'
      +'<span class="ct">'+(l.n?(l.n+' Fragen ›'):'keine Altfragen')+'</span></div>';
  });
  app.innerHTML=h;
  document.getElementById('ls').addEventListener('input',function(){var t=this.value.trim().toLowerCase();app.querySelectorAll('.lzrow').forEach(function(r){r.style.display=(!t||r.dataset.s.indexOf(t)>=0)?'':'none';});app.querySelectorAll('.mw-head,.mod-head').forEach(function(x){x.style.display=t?'none':'';});});
}
function renderLzDetail(lid){
  var l=LZ.filter(function(x){return x.id===lid})[0]; var qs=Q.filter(function(q){return q.lz===lid}); var col=MODCOL[l.mod]||'#666';
  window.scrollTo(0,0);
  var h='<div class="toolbar"><div class="toolrow"><span class="act" id="backlz">← zurück zu Lernziele</span><span class="modechip">Klausurmodus</span></div></div>';
  h+='<div class="lz" style="border-left-color:'+col+'"><span class="lz-id" style="background:'+col+'">'+esc(l.id)+'</span> <span class="lz-count">'+l.mod+' · '+l.mw+' · '+qs.length+' Frage(n)</span>'
    +'<div class="lz-ver">'+esc(l.ver)+'</div><div class="lz-text">'+esc(l.t)+'</div>';
  if(qs.length) qs.forEach(function(q){h+=cardHtml(q);}); else h+='<div class="empty-msg">Zu diesem Lernziel gibt es bisher keine Altklausurfragen.</div>';
  h+='</div>';
  app.innerHTML=h; document.getElementById('backlz').addEventListener('click',function(){showView('lernziele');});
}

function renderMarkiert(){
  var ids=Array.from(marks); var qs=ids.map(function(i){return qById[i]}).filter(Boolean);
  var h='<div class="toolbar"><div class="toolrow"><b>★ Markierte Fragen ('+qs.length+')</b><span class="modechip">Klausurmodus</span></div>';
  if(qs.length){h+='<div class="toolrow"><button class="btn" id="mkquiz">Als Quiz üben</button><button class="btn" id="mkclear">Alle entfernen</button></div>';}
  h+='</div>';
  if(!qs.length){h+='<div class="empty-msg">Noch keine Fragen markiert. Klicke bei einer Frage auf „☆ markieren", um sie hier zu sammeln (z.B. schwierige Fragen).</div>';}
  else { h+='<div class="lz" style="border-left-color:#b45309">'; qs.forEach(function(q){h+=cardHtml(q);}); h+='</div>'; }
  app.innerHTML=h;
  if(qs.length){ document.getElementById('mkquiz').addEventListener('click',function(){startQuizWith(shuffle(ids));});
    document.getElementById('mkclear').addEventListener('click',function(){if(confirm('Alle Markierungen entfernen?')){marks=new Set();saveMarks(marks);updMarkCount();renderMarkiert();}}); }
}

// ---------- Quiz ----------
function scopePairs(){var byMod={};Q.forEach(function(q){(byMod[q.mod]=byMod[q.mod]||{})[q.mw]=true;});return byMod;}
function renderQuiz(){
  var sc=scopePairs();
  var h='<div class="setup"><h3>Quiz zusammenstellen</h3><div class="sub">Wähle Module/Modulwochen und die Anzahl der Zufallsfragen. Ablauf: eine Frage nach der anderen, am Ende eine Auswertung.</div>';
  MODS.forEach(function(m){ if(!sc[m])return;
    h+='<div class="modblock"><label><input type="checkbox" class="cbmod" data-mod="'+m+'" checked> <b style="color:'+MODCOL[m]+'">'+m+'</b> · '+esc(MODNAME[m]||"")+'</label><div style="margin-left:18px">';
    Object.keys(sc[m]).sort().forEach(function(mw){ h+='<label><input type="checkbox" class="cbmw" data-mod="'+m+'" data-mw="'+mw+'" checked> '+mw+'</label>'; });
    h+='</div></div>';
  });
  h+='<div class="cnt" style="margin-top:10px"><b>Anzahl:</b><br>'
   +['10','20','40'].map(function(n){return '<label><input type="radio" name="cnt" value="'+n+'"'+(n==='20'?' checked':'')+'> '+n+'</label>';}).join('')
   +'<label><input type="radio" name="cnt" value="all"> Alle</label>'
   +'<label><input type="radio" name="cnt" value="custom"> Eigene: <input type="number" id="customN" min="1" max="500" value="30" style="width:64px;padding:4px;border:1px solid var(--line);border-radius:6px"></label></div>';
  h+='<div id="scopecount" class="sub" style="margin-top:8px"></div>';
  h+='<button class="startbtn" id="startq">Quiz starten ▶</button></div>';
  app.innerHTML=h;
  function sync(){ // module checkbox toggles its mws
    app.querySelectorAll('.cbmod').forEach(function(cm){ cm.addEventListener('change',function(){ app.querySelectorAll('.cbmw[data-mod="'+cm.dataset.mod+'"]').forEach(function(x){x.checked=cm.checked;}); upd(); }); });
    app.querySelectorAll('.cbmw').forEach(function(x){x.addEventListener('change',upd);});
    app.querySelectorAll('input[name=cnt]').forEach(function(x){x.addEventListener('change',upd);}); document.getElementById('customN').addEventListener('input',upd);
  }
  function selPairs(){var s={};app.querySelectorAll('.cbmw:checked').forEach(function(x){s[x.dataset.mod+'|'+x.dataset.mw]=1;});return s;}
  function pool(){var s=selPairs();return Q.filter(function(q){return s[q.mod+'|'+q.mw];});}
  function upd(){var p=pool().length;document.getElementById('scopecount').textContent=p+' Fragen im gewählten Umfang verfügbar.';}
  sync(); upd();
  document.getElementById('startq').addEventListener('click',function(){
    var p=pool(); if(!p.length){alert('Bitte mindestens eine Modulwoche auswählen.');return;}
    var cnt=app.querySelector('input[name=cnt]:checked').value, n;
    if(cnt==='all')n=p.length; else if(cnt==='custom')n=Math.max(1,parseInt(document.getElementById('customN').value||'0',10)); else n=parseInt(cnt,10);
    var ids=shuffle(p.map(function(q){return q.id})).slice(0,Math.min(n,p.length));
    startQuizWith(ids);
  });
}
var QZ=null;
function startQuizWith(ids){ QZ={ids:ids,idx:0,res:{}}; renderRunner(); }
function renderRunner(){
  window.scrollTo(0,0); var q=qById[QZ.ids[QZ.idx]], total=QZ.ids.length, num=QZ.idx+1;
  var done=Object.keys(QZ.res).length, corr=Object.keys(QZ.res).filter(function(k){return QZ.res[k]}).length;
  var h='<div class="runner"><div class="progress">Frage '+num+' / '+total+' · richtig: '+corr+'/'+done+'</div><div class="runnerbar"><i style="width:'+Math.round(num/total*100)+'%"></i></div>';
  h+='<div class="qcard">'+cardHtml(q)+'</div>';
  h+='<div class="qnav"><button class="nextbtn" id="nx" disabled>'+(QZ.idx+1>=total?'Auswertung ▶':'Weiter ▶')+'</button><span class="skip" id="sk">überspringen</span><span class="skip" id="ab" style="margin-left:auto">Quiz abbrechen</span></div></div>';
  app.innerHTML=h;
  // if already answered earlier, lock state
  if(QZ.res.hasOwnProperty(q.id)){ var card=app.querySelector('.card'); card.classList.add('answered'); document.getElementById('nx').disabled=false; }
  document.getElementById('nx').addEventListener('click',advance);
  document.getElementById('sk').addEventListener('click',advance);
  document.getElementById('ab').addEventListener('click',function(){QZ=null;showView('quiz');});
}
function advance(){ if(QZ.idx+1>=QZ.ids.length){renderSummary();} else {QZ.idx++;renderRunner();} }
function renderSummary(){
  window.scrollTo(0,0); var total=QZ.ids.length, done=Object.keys(QZ.res).length, corr=Object.keys(QZ.res).filter(function(k){return QZ.res[k]}).length;
  var wrongIds=QZ.ids.filter(function(i){return QZ.res[i]===false || !QZ.res.hasOwnProperty(i)});
  var pct=total?Math.round(corr/total*100):0;
  var h='<div class="summary"><div class="bigscore">'+corr+' / '+total+' richtig ('+pct+'%)</div>';
  h+='<div class="sub">'+ (total-done) +' übersprungen.</div>';
  h+='<div class="acts"><button class="btn" id="again">Neues Quiz</button>';
  if(wrongIds.length) h+='<button class="btn" id="redo">Falsche/offene wiederholen ('+wrongIds.length+')</button>';
  h+='<button class="btn" id="markwrong">Falsche markieren ★</button></div>';
  if(wrongIds.length){ h+='<h3 style="margin:6px 0">Zum Nachlernen:</h3><div class="lz" style="border-left-color:#b91c1c">'; wrongIds.forEach(function(i){h+=cardHtml(qById[i]);}); h+='</div>'; }
  else h+='<div class="empty-msg">Alles richtig 🎉</div>';
  h+='</div>';
  app.innerHTML=h;
  // reveal correct on the nachlern-cards
  app.querySelectorAll('.summary .card').forEach(function(c){c.classList.add('answered');});
  document.getElementById('again').addEventListener('click',function(){QZ=null;showView('quiz');});
  if(document.getElementById('redo'))document.getElementById('redo').addEventListener('click',function(){startQuizWith(shuffle(wrongIds));});
  document.getElementById('markwrong').addEventListener('click',function(){wrongIds.forEach(function(i){marks.add(i)});saveMarks(marks);updMarkCount();alert(wrongIds.length+' Fragen markiert.');});
}

function renderHilfe(){
  var h='<div class="help"><h3>So funktioniert '+esc(NAME)+'</h3>'
   +'<ul><li><b>Üben:</b> alle Fragen nach Modul → Modulwoche → Lernziel, mit Filtern und Suche.</li>'
   +'<li><b>Quiz:</b> Module/Modulwochen wählen, Anzahl (10/20/40/alle/eigene) → zufälliges Set, eine Frage nach der anderen, Auswertung am Ende.</li>'
   +'<li><b>Lernziele:</b> alle Lernziele je Modul/Modulwoche; Klick zeigt die zugehörigen Fragen.</li>'
   +'<li><b>★ Markiert:</b> schwierige Fragen mit „☆ markieren" sammeln (im Browser gespeichert) und gezielt wiederholen.</li>'
   +'<li><b>Klausurmodus:</b> Antwort anklicken → richtig/falsch + Lösung. <b>PDF:</b> im Browser Drucken → Als PDF sichern.</li></ul>'
   +'<h3>Fehler gefunden oder Feedback?</h3>'
   +'<p>Melde es dem Entwickler – z.B. wenn eine Frage falsch, unklar oder nicht (mehr) relevant ist. Direkt an einer Frage über „⚑ Fehler melden" oder hier:</p>'
   +'<button class="mailbtn" id="genfb">✉ Feedback senden</button>'
   +'<h3>Hinweis &amp; Haftungsausschluss</h3>'
   +'<p class="sub">'+esc(NAME)+' ist ein inoffizielles, privates Lernprojekt. Die Fragen orientieren sich an den Lernzielen des Semesters und könnten so oder in ähnlicher Form in Klausuren vorkommen – es sind keine offiziellen Prüfungsfragen. Es besteht keine Verbindung zu einer Universität, Fakultät oder Fachschaft. Es wird keine Gewähr für Richtigkeit, Vollständigkeit oder Aktualität von Fragen und Lösungen übernommen. Nutzung auf eigene Verantwortung. Stand der Daten: '+esc(S.meta.stand)+'.</p></div>';
  app.innerHTML=h;
  document.getElementById('genfb').addEventListener('click',function(){openFeedback(null);});
}

// ---------- global handlers ----------
function toggleMark(id,el){ if(marks.has(id)){marks.delete(id);} else {marks.add(id);} saveMarks(marks); updMarkCount();
  document.querySelectorAll('.card[data-id="'+CSS.escape(id)+'"] .act.mark').forEach(function(a){var on=marks.has(id);a.classList.toggle('on',on);a.textContent=on?'★ markiert':'☆ markieren';}); }
var fbCtx=null;
function openFeedback(ctx){ fbCtx=ctx;
  document.getElementById('fbctx').textContent = ctx? ('Bezug: Frage '+ctx.qid+(ctx.lz?(' · Lernziel '+ctx.lz):'')) : 'Allgemeines Feedback';
  document.getElementById('fbmsg').value=''; document.getElementById('fbmail').value=''; document.getElementById('fbstatus').textContent=''; document.getElementById('fbhp').value='';
  document.getElementById('fb').classList.add('open'); setTimeout(function(){document.getElementById('fbmsg').focus();},50); }
function closeFeedback(){ document.getElementById('fb').classList.remove('open'); }
function sendFeedback(){
  var msg=document.getElementById('fbmsg').value.trim(), mail=document.getElementById('fbmail').value.trim(), st=document.getElementById('fbstatus');
  if(document.getElementById('fbhp').value){ closeFeedback(); return; }
  if(!msg){ st.textContent='Bitte eine Nachricht eingeben.'; return; }
  if(W3F.indexOf('__')===0){ st.textContent='Feedback ist derzeit nicht konfiguriert.'; return; }
  var c=fbCtx, full=(c?('Frage-ID: '+c.qid+'\nModul/MW/Lernziel: '+c.mod+' / '+c.mw+' / '+c.lz+'\nFrage: '+(c.q||'').slice(0,300)+'\nQuelle(n): '+(c.src||'')+'\n\n'):'')+'Nachricht:\n'+msg;
  st.textContent='Senden …';
  fetch('https://api.web3forms.com/submit',{method:'POST',headers:{'Content-Type':'application/json',Accept:'application/json'},
    body:JSON.stringify({access_key:W3F, subject:NAME+' Feedback'+(c?(' – Frage '+c.qid):''), message:full, replyto:(mail||'noreply@example.com'), from_name:'Kreuzzug Web-App'})})
   .then(function(r){return r.json();}).then(function(j){ if(j.success){ st.textContent='Danke! Deine Nachricht ist beim Entwickler gelandet.'; setTimeout(closeFeedback,1400);} else { st.textContent='Konnte nicht gesendet werden – bitte später erneut versuchen.'; } })
   .catch(function(){ st.textContent='Netzwerkfehler – bitte später erneut versuchen.'; });
}
var lb=document.getElementById('lb'), lbimg=lb.querySelector('img');
document.addEventListener('click',function(e){
  var tab=e.target.closest('.tab'); if(tab){showView(tab.dataset.view);return;}
  var lzrow=e.target.closest('.lzrow'); if(lzrow && lzrow.dataset.lz && !lzrow.classList.contains('empty')){renderLzDetail(lzrow.dataset.lz);return;}
  var img=e.target.closest('.abb img'); if(img){lbimg.src=img.src;lb.style.display='flex';document.body.classList.add('lbopen');return;}
  if(e.target.closest('#lb')){lb.style.display='none';document.body.classList.remove('lbopen');return;}
  var act=e.target.closest('[data-act]'); if(act){var card=act.closest('.card');var id=card.dataset.id; if(act.dataset.act==='mark')toggleMark(id,act); else if(act.dataset.act==='report'){var q=qById[id];openFeedback({qid:id,mod:q.mod,mw:q.mw,lz:q.lz,q:q.q,src:q.src});} return;}
  var opt=e.target.closest('.opt'); if(opt){var card=opt.closest('.card'); if(card && !card.classList.contains('answered')){card.classList.add('answered'); var ok=!!opt.dataset.correct; opt.classList.add(ok?'chosen-correct':'chosen-wrong');
    if(QZ && ST.view==='quiz'){} // handled below
    if(QZ){var qid=card.dataset.id; if(QZ.ids[QZ.idx]===qid && !QZ.res.hasOwnProperty(qid)){QZ.res[qid]=ok; var nx=document.getElementById('nx'); if(nx)nx.disabled=false;}}
  } return; }
});
document.getElementById('fbsend').addEventListener('click',sendFeedback);
document.getElementById('fbcancel').addEventListener('click',closeFeedback);
document.getElementById('fb').addEventListener('click',function(e){if(e.target.id==='fb')closeFeedback();});
var tb=document.getElementById('themebtn'); if(tb)tb.addEventListener('click',function(){var d=document.body.classList.toggle('dark');try{localStorage.kz_theme=d?'dark':'light';}catch(e){}});
updMarkCount(); showView('ueben');
})();
</script>
</body></html>
